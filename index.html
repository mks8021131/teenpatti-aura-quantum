<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teen Patti Aura Quantum</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar: Command Center -->
        <aside class="sidebar sidebar-left">
            <h2>COMMAND</h2>
            
            <div class="control-group">
                <span class="label">Table Size</span>
                <div class="player-selector">
                    <button class="selector-btn" onclick="setPlayerCount(2)">2</button>
                    <button class="selector-btn" onclick="setPlayerCount(3)">3</button>
                    <button class="selector-btn active" id="btn-p4" onclick="setPlayerCount(4)">4</button>
                </div>
            </div>

            <div class="control-group">
                <span class="label">Experience</span>
                <div class="toggle-item">
                    <span>Sound</span>
                    <input type="checkbox" id="sound-toggle" checked>
                </div>
                <div class="toggle-item">
                    <span>Haptic</span>
                    <input type="checkbox" id="haptic-toggle" checked>
                </div>
            </div>

            <button class="btn-primary" id="deal-btn" onclick="dealCards()">DEAL HAND</button>
            <button class="btn-primary hidden" id="show-btn" onclick="showWinner()">SHOW HANDS</button>
            <button class="btn-primary hidden" id="restart-btn" onclick="resetGame()">NEXT ROUND</button>
        </aside>

        <!-- Main Game: The Table -->
        <main class="main-game">
            <div class="game-table" id="game-table">
                <!-- Center Focus Focal Point -->
                <div class="center-focus">
                    <div class="deck-stack"></div>
                </div>

                <div id="players-container">
                    <!-- Dynamic slots injected here -->
                </div>
            </div>

            <!-- Immersive Winner Overlay -->
            <div id="winner-banner" class="winner-banner hidden">
                <div id="win-name">PLAYER 1</div>
                <div id="win-hand">TRAIL</div>
            </div>
        </main>

        <!-- Sidebar: Intelligence -->
        <aside class="sidebar sidebar-right">
            <h2>INTELLIGENCE</h2>
            <div class="info-list">
                <div class="info-card">
                    <span class="label">Game Status</span>
                    <span class="val" id="game-status">IDLE</span>
                </div>
                <div class="info-card">
                    <span class="label">Last Victory</span>
                    <span class="val" id="last-winner">NONE</span>
                </div>
                <div class="info-card">
                    <span class="label">Round</span>
                    <span class="val" id="round-count">1</span>
                </div>
            </div>
        </aside>
    </div>

    <!-- Live Auto-Reload Dashboard Injection -->
    <script src="game.js"></script>
</body>
</html>
