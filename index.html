<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teen Patti Aura Quantum</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>TEEN PATTI <span class="aura">AURA</span></h1>
        </header>

        <div id="setup-screen" class="screen">
            <h2>SELECT NUMBER OF PLAYERS</h2>
            <div class="player-selection">
                <button class="btn-select" onclick="startGame(2)">2</button>
                <button class="btn-select" onclick="startGame(3)">3</button>
                <button class="btn-select" onclick="startGame(4)">4</button>
            </div>
        </div>

        <div id="game-screen" class="screen hidden">
            <div class="table-area">
                <div id="players-container"></div>
            </div>
            
            <div id="winner-banner" class="winner-banner hidden">
                <div id="winner-text">WINNER!</div>
                <div id="winning-hand-type">TRAIL</div>
            </div>

            <div class="controls">
                <button id="deal-btn" class="btn-main" onclick="dealCards()">DEAL</button>
                <button id="show-btn" class="btn-main hidden" onclick="showWinner()">SHOW</button>
                <button id="restart-btn" class="btn-main hidden" onclick="resetGame()">RESTART</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
