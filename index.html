<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teen Patti Aura Quantum</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Left Sidebar: Controls -->
        <aside class="sidebar sidebar-left">
            <h2>Controls</h2>
            
            <div class="control-group">
                <span class="label">Players</span>
                <div class="player-selector">
                    <button class="selector-btn" onclick="setPlayerCount(2)">2</button>
                    <button class="selector-btn" onclick="setPlayerCount(3)">3</button>
                    <button class="selector-btn active" id="btn-p4" onclick="setPlayerCount(4)">4</button>
                </div>
            </div>

            <div class="control-group">
                <span class="label">Settings</span>
                <div class="toggle-item">
                    <span>Sound</span>
                    <input type="checkbox" id="sound-toggle" checked>
                </div>
                <div class="toggle-item">
                    <span>Haptic</span>
                    <input type="checkbox" id="haptic-toggle" checked>
                </div>
            </div>

            <button class="btn-primary" id="deal-btn" onclick="dealCards()">Deal Cards</button>
            <button class="btn-primary hidden" id="show-btn" onclick="showWinner()">Show Winner</button>
            <button class="btn-primary hidden" id="restart-btn" onclick="resetGame()">New Round</button>
        </aside>

        <!-- Center Area: Game Table -->
        <main class="main-game">
            <div class="game-table" id="game-table">
                <div class="center-deck">
                    <div class="card-box">
                        <div class="card-side card-back"></div>
                    </div>
                </div>
                <div id="players-container">
                    <!-- Slots will be injected here -->
                </div>
            </div>

            <!-- Winner Banner -->
            <div id="winner-banner" class="winner-banner hidden">
                <div id="win-name">PLAYER 1</div>
                <div id="win-hand">TRAIL (SET)</div>
            </div>
        </main>

        <!-- Right Sidebar: Info -->
        <aside class="sidebar sidebar-right">
            <h2>Game Info</h2>
            <div class="info-list">
                <div class="info-item">
                    <span class="label">Status</span>
                    <span class="val" id="game-status">Waiting</span>
                </div>
                <div class="info-item">
                    <span class="label">Last Winner</span>
                    <span class="val" id="last-winner">None</span>
                </div>
                <div class="info-item">
                    <span class="label">Round</span>
                    <span class="val" id="round-count">1</span>
                </div>
            </div>
        </aside>
    </div>

    <script src="game.js"></script>
</body>
</html>
