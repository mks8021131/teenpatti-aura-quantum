<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teen Patti Royale | Ultra-Premium 3D Experience</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="logo">ROYALE <span>QUANTUM</span></div>
        <div class="nav-links">
            <a href="#">Lobby</a>
            <a href="#" class="btn-apk-nav">Download APK</a>
        </div>
    </nav>

    <div class="app-container">
        <!-- Command Panel -->
        <aside class="sidebar">
            <h2>Command</h2>
            <div class="control-group">
                <span class="label">Players</span>
                <div class="player-selector">
                    <button class="selector-btn" onclick="setPlayerCount(2)">2</button>
                    <button class="selector-btn" onclick="setPlayerCount(3)">3</button>
                    <button class="selector-btn active" onclick="setPlayerCount(4)">4</button>
                </div>
            </div>
            <div class="control-group">
                <span class="label">Settings</span>
                <div class="toggle-item"><span>Sound</span><input type="checkbox" id="sound-toggle" checked></div>
                <div class="toggle-item"><span>Haptic</span><input type="checkbox" id="haptic-toggle" checked></div>
            </div>
            <button class="btn-primary" id="deal-btn" onclick="dealCards()">Deal Hand</button>
            <button class="btn-primary hidden" id="show-btn">Next Player</button>
            <button class="btn-primary hidden" id="restart-btn" onclick="resetGame()">New Round</button>
        </aside>

        <!-- 3D Game Scene -->
        <main class="main-game">
            <div class="table-3d-wrap">
                <div class="table-surface">
                    <div class="center-focus">
                        <div class="deck-stack"></div>
                    </div>
                    <div id="players-container"></div>
                </div>
            </div>

            <!-- Transition Overlay -->
            <div id="pass-overlay" class="pass-overlay hidden">
                <p>Pass Device To</p>
                <h2 id="pass-player-name">PLAYER 1</h2>
                <button class="btn-primary" style="width: auto; padding: 15px 50px;" onclick="revealCurrentPlayer()">Tap to Reveal</button>
            </div>

            <!-- Victory Banner -->
            <div id="winner-banner" class="winner-banner hidden">
                <div id="win-name">PLAYER 1</div>
                <div id="win-hand">TRAIL (SET)</div>
            </div>
        </main>

        <!-- Intelligence Panel -->
        <aside class="sidebar sidebar-right">
            <h2>Stats</h2>
            <div class="control-group">
                <span class="label">Status</span>
                <div id="game-status" style="font-weight: 900; color: var(--neon-cyan);">READY</div>
            </div>
            <div class="control-group">
                <span class="label">Last Winner</span>
                <div id="last-winner" style="font-weight: 900;">NONE</div>
            </div>
            <div class="control-group">
                <span class="label">Round</span>
                <div id="round-count" style="font-weight: 900; color: var(--neon-cyan);">1</div>
            </div>
        </aside>
    </div>

    <script src="game.js"></script>
</body>
</html>
